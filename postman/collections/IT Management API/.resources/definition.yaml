$kind: collection
name: IT Management API
description: >-
  API collection for IT Management Server - a NestJS application for managing
  users, customers, branches, and devices.


  ## Authentication


  This API uses JWT Bearer token authentication. Most endpoints require
  authentication.


  - Login via POST /auth/login to get an access_token
      
  - Include the token in Authorization header as: Bearer
      

  ## Roles


  - SUPER_ADMIN: Full access to all resources
      
  - ADMIN: Can create customers, branches, devices
      
  - ENGINEER: Limited access to engineer dashboard
variables:
  baseUrl: http://localhost:3000
  accessToken: ""
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
