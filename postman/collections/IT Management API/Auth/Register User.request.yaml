$kind: http-request
name: Register User
method: POST
url: '{{baseUrl}}/auth/register'
order: 1000
description: Register a new user account. No authentication required.
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "password123",
      "role": "ADMIN"
    }
